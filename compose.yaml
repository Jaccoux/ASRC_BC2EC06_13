services:
  jenkinsadmin:
    build:
      context: .
      # Utilisation de la version la plus récente pour encapsuler la conf Jenkins sans casser le Dockerfile racine
      dockerfile_inline: |
        FROM jenkins/jenkins:jdk21
        USER jenkins
        RUN jenkins-plugin-cli --plugins "workflow-aggregator git docker-workflow"
    container_name: jenkins_server
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home

  jenkinsagent1:
    image: jenkins/agent
    container_name: jenkins_agent_1
    restart: on-failure
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apt-get update && apt-get install -y curl && curl -fsSL https://get.docker.com | sh
        exec /usr/local/bin/jenkins-agent
    depends_on:
      - jenkinsadmin

  jenkinsagent2:
    image: jenkins/agent
    container_name: jenkins_agent_2
    restart: on-failure
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apt-get update && apt-get install -y curl && curl -fsSL https://get.docker.com | sh
        exec /usr/local/bin/jenkins-agent
    depends_on:
      - jenkinsadmin

  # Service de configuration automatique mis à jour pour le pipeline de l'Étape 7
  jenkins-cli-setup:
    image: jenkins/jenkins:jdk21
    container_name: jenkins_cli_setup
    user: root
    volumes:
      - jenkins_data:/var/jenkins_home
    depends_on:
      - jenkinsadmin
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Attente de l'initialisation du serveur Jenkins..."
        sleep 45
        cd /tmp
        echo "Téléchargement du binaire jenkins-cli.jar..."
        curl -sS -o jenkins-cli.jar http://jenkins_server:8080/jnlpJars/jenkins-cli.jar
        
        PASSWORD=$$(cat /var/jenkins_home/secrets/initialAdminPassword)
        
        echo "Déclaration de jenkins_agent_1..."
        echo '<slave><name>jenkins_agent_1</name><remoteFS>/home/jenkins</remoteFS><numExecutors>1</numExecutors><mode>NORMAL</mode><retentionStrategy class="hudson.slaves.RetentionStrategy$$Always"/><launcher class="hudson.slaves.JNLPLauncher"/></slave>' | java -jar jenkins-cli.jar -http -s http://jenkins_server:8080/ -auth admin:$$PASSWORD create-node jenkins_agent_1
        
        echo "Déclaration de jenkins_agent_2..."
        echo '<slave><name>jenkins_agent_2</name><remoteFS>/home/jenkins</remoteFS><numExecutors>1</numExecutors><mode>NORMAL</mode><retentionStrategy class="hudson.slaves.RetentionStrategy$$Always"/><launcher class="hudson.slaves.JNLPLauncher"/></slave>' | java -jar jenkins-cli.jar -http -s http://jenkins_server:8080/ -auth admin:$$PASSWORD create-node jenkins_agent_2
        
        echo "Création de la définition du Job Pipeline..."
        cat << 'EOF' > /tmp/job.xml
        <flow-definition plugin="workflow-job">
          <definition class="org.jenkinsci.plugins.workflow.cps.CpsFlowDefinition" plugin="workflow-cps">
            <script>
        pipeline {
            agent any
            stages {
                stage('Lancement des Tests Applicatifs') {
                    agent {
                        docker { image 'python:3.10-slim' }
                    }
                    steps {
                        sh 'python --version'
                    }
                }
                stage('Build Image Water') {
                    steps {
                        sh 'docker build -t water:latest .'
                    }
                }
                stage('Push Image Registry') {
                    steps {
                        sh 'docker tag water:latest localhost:5000/water:latest'
                        sh 'docker push localhost:5000/water:latest'
                    }
                }
            }
        }
            </script>
            <sandbox>true</sandbox>
          </definition>
        </flow-definition>
        EOF
        
        echo "Injection du Job Pipeline mis à jour..."
        java -jar jenkins-cli.jar -http -s http://jenkins_server:8080/ -auth admin:$$PASSWORD create-job pipeline-tests < /tmp/job.xml
        echo "Configuration de l'Etape 7 terminée avec succès !"

  jenkinsagentssh:
    image: jenkins/ssh-agent
    container_name: jenkins_agent_ssh
    restart: on-failure
    user: root
    environment:
      - JENKINS_AGENT_SSH_PUBKEY=ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIH38hrWzSw5QuclgSm+nrWvEZzOlFUrRwBf9ctImXWTn jenkins
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apt-get update && apt-get install -y curl && curl -fsSL https://get.docker.com | sh
        exec /usr/local/bin/setup-sshd
    depends_on:
      - jenkinsadmin

  # Nouveau service de Registre Local requis pour l'Étape 7
  registry:
    image: registry:3
    container_name: local_registry
    ports:
      - "5000:5000"
    restart: always

volumes:
  jenkins_data: